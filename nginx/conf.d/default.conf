# =============================================================
#  Nginx 站點設定 — 久洋機械網站
#
#  部署時請：
#    1. 將下方所有 YOUR_DOMAIN.com 替換成實際網域（例：new.jeouyang.com.tw）
#    2. 先以 HTTP 版（下半段）測試連線，確認正常後
#    3. 用 1Panel 或 certbot 申請 Let's Encrypt 憑證
#    4. 取得憑證後啟用 HTTPS 區塊（把下面 HTTPS 段落的 # 拿掉）
# =============================================================

# --- (A) HTTP 預設：接受 HTTP、自動轉 HTTPS（正式上線後啟用） ---
# server {
#     listen 80;
#     listen [::]:80;
#     server_name YOUR_DOMAIN.com www.YOUR_DOMAIN.com;
#
#     # Let's Encrypt 驗證用
#     location /.well-known/acme-challenge/ {
#         root /var/www/public;
#     }
#
#     # 其他所有流量自動轉 HTTPS
#     location / {
#         return 301 https://$host$request_uri;
#     }
# }

# --- (B) 測試階段用：純 HTTP 直接反向代理到 Next.js ---
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 20m;

    # 給 Let's Encrypt 驗證用
    location /.well-known/acme-challenge/ {
        root /var/www/public;
    }

    # 反向代理到 Next.js 容器
    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    # 靜態檔案快取（選用）
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff2?)$ {
        proxy_pass http://web:3000;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
}

